<nav class="navigation">
    <div class="container">
        <div class="nav-wrapper">
            <a href="/" class="nav-logo">
                <span class="logo-text">Rise</span>
            </a>

            <ul class="nav-links">
                <li><a href="/tools/tournament-bracket-generator/"{% if page.url == '/tools/tournament-bracket-generator/' %} class="active"{% endif %}>Bracket Maker</a></li>
                <li><a href="/features/"{% if page.url == '/features/' %} class="active"{% endif %}>Features</a></li>
                <li><a href="/pricing/"{% if page.url == '/pricing/' %} class="active"{% endif %}>Pricing</a></li>
                <li><a href="/blog/"{% if page.url == '/blog/' %} class="active"{% endif %}>Blog</a></li>
                <li><a href="/waitlist/" class="nav-cta">Join Waitlist</a></li>
            </ul>

            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.querySelector('.mobile-menu-toggle');
    var navLinks = document.querySelector('.nav-links');

    toggle.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        toggle.classList.toggle('active');
    });

    // Close menu when clicking a link
    navLinks.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
            navLinks.classList.remove('active');
            toggle.classList.remove('active');
        });
    });
});
</script>
