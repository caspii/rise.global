<style>
.waitlist-form-wrapper {
    max-width: 480px;
    margin: 0 auto;
}
.waitlist-form-wrapper h3 {
    margin-bottom: 0.75rem;
}
.waitlist-form-wrapper .waitlist-form {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
}
.waitlist-form-wrapper .waitlist-form input[type="email"] {
    flex: 1 1 240px;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-color, #d1d5db);
    border-radius: 0.5rem;
    font-size: 1rem;
    outline: none;
}
.waitlist-form-wrapper .waitlist-form input[type="email"]:focus {
    border-color: var(--primary-color, #c8ff00);
    box-shadow: 0 0 0 3px rgba(200, 255, 0, 0.15);
}
.waitlist-form-wrapper .waitlist-form button[type="submit"] {
    padding: 0.75rem 1.5rem;
    background: var(--gradient-cta, var(--primary-color));
    color: var(--bg-dark, #0a0e1a);
    border: none;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 800;
    font-family: var(--font-display, sans-serif);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.waitlist-form-wrapper .waitlist-form button[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(200, 255, 0, 0.3);
}
.waitlist-form-wrapper .waitlist-fine-print {
    font-size: 0.8rem;
    color: var(--text-muted, #6b7280);
    margin-top: 0.5rem;
}
</style>

<div class="waitlist-form-wrapper">
    {% if include.heading %}
    <h3>{{ include.heading }}</h3>
    {% endif %}

    <form
        action="{{ site.waitlist_form_action }}"
        method="post"
        class="waitlist-form"
    >
        <input
            type="email"
            name="email"
            placeholder="you@example.com"
            required
            aria-label="Email address"
        />
        <button type="submit">Join the Waitlist</button>
    </form>
    <p class="waitlist-fine-print">No spam. We'll email you when new features launch.</p>
</div>
