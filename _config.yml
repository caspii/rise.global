# Jekyll configuration for rise.global
title: Rise Global - Free Online Tools
description: Free online tools for teams, teachers, and event organizers. Random team generator, spin the wheel, tournament bracket maker, and more.
author: Rise Global
url: https://rise.global
baseurl: ""

# SEO and metadata
tagline: Free online tools for teams, teachers, and event organizers
keywords: free online tools, random team generator, spin the wheel, tournament bracket generator, group maker, team builder, competition tools

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Collections
collections:
  features:
    output: false

# Permalink structure for blog posts
permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - CLAUDE.md
  - posts-todo.md