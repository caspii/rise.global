# Jekyll configuration for rise.global
title: "Rise"
description: "Create beautiful tournament brackets in seconds. Free, no signup required. Single elimination, double elimination, and round robin formats."
author: Rise Global
url: https://rise.global
baseurl: ""

# SEO and metadata
tagline: "The modern tournament bracket maker — free, fast, and built for live competition."
keywords: "bracket maker, tournament bracket generator, free bracket maker, double elimination bracket, round robin generator, tournament bracket, bracket creator"

# Waitlist
waitlist_form_action: "https://buttondown.com/api/emails/embed-subscribe/riseglobal"

# Branding
powered_by_text: "Powered by KeepTheScore"
powered_by_url: "https://keepthescore.com?utm_source=rise.global&utm_medium=referral&utm_campaign=powered_by"

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Collections
collections:
  features:
    output: false

# Permalink structure for blog posts
permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/images/mockups/mockup-01-live-scoreboard.png

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - CLAUDE.md
  - POSITIONING.md
  - IMAGE-PROMPTS.md
  - MOCKUPS.md
  - posts-todo.md
  - test
